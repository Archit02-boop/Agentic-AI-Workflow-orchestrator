

services:
  api:
    build: .
    container_name: agentic-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/code

  worker:
    build: .
    container_name: agentic-worker
    command: python -m app.worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/code

  postgres:
    image: postgres:16
    container_name: orchestrator-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchestrator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: orchestrator-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: